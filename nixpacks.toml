[phases.setup]
nixPkgs = [
  "python311",
  "chromium",
  "glib",
  "nss",
  "nspr",
  "atk",
  "atk-bridge",
  "cups",
  "dbus",
  "at-spi2-core",
  "xkbcommon",
  "gtk3",
  "pango",
  "cairo",
  "expat",
  "libdrm",
  "mesa",
  "libxshmfence"
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[start]
cmd = "bash -c 'python -m playwright install chromium && python bot.py'"
