[phases.setup]
nixPkgs = [
  "python311",
  "chromium",
  "glib",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "at-spi2-atk",
  "xkbcommon",
  "gtk3",
  "pango",
  "cairo",
  "expat",
  "libdrm",
  "mesa"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "python -m playwright install chromium"
]

[start]
cmd = "python bot.py"
